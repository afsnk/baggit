# fly.toml app configuration file generated for afsnk-pay-server-staging on 2026-03-18T14:51:59+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'afsnk-pay-server-staging'
primary_region = 'lhr'

[build]
  dockerfile = './staging.api.Dockerfile'

[env]
  PORT = '9999'

[http_service]
  internal_port = 9999
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
